<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>رادار</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<h1>📈 رادار</h1>
<p>اتصال به دیتابیس در حال انجام...</p>
</header>

<div class="card">
<h2>نماد منتخب</h2>

<h1 id="symbol">...</h1>

<div class="row">
<span>امتیاز</span>
<b id="score">...</b>
</div>

<div class="row">
<span>تکنیکال</span>
<b id="technical">...</b>
</div>

<div class="row">
<span>پول هوشمند</span>
<b id="smart_money">...</b>
</div>

</div>

<script>

fetch("https://stnhjfodwurnbkzxgnen.supabase.co/rest/v1/stocks?select=*")
.then(res=>res.json())
.then(data=>{

let stock=data[0];

document.getElementById("symbol").innerText=stock.Symbol;
document.getElementById("score").innerText=stock.Score;
document.getElementById("technical").innerText=stock.Technical;
document.getElementById("smart_money").innerText=stock.Smart_money;

});

</script>

</body>
</html>
