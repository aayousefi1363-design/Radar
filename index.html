<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>رادار</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<div>
<h1>📈 رادار</h1>
<p>اتصال به Supabase</p>
</div>
</header>

<section class="hero">
<h2>نماد منتخب دیتابیس</h2>
<h1 id="symbol">در حال بارگذاری...</h1>
<p id="scoreText">...</p>
</section>

<div class="market-box">

<div class="market-item">
<h3>تکنیکال</h3>
<span id="technical">...</span>
</div>

<div class="market-item">
<h3>پول هوشمند</h3>
<span id="smartMoney">...</span>
</div>

<div class="market-item">
<h3>روند</h3>
<span id="trend">...</span>
</div>

</div>

<div class="card">

<h2>داده دریافتی</h2>

<div class="row">
<span>بنیادی</span>
<b id="fundamental">...</b>
</div>

<div class="row">
<span>صنعت</span>
<b id="industry">...</b>
</div>

</div>

<nav>
<a href="#">خانه</a>
<a href="#">رادار</a>
<a href="#">واچ‌لیست</a>
<a href="#">پروفایل</a>
</nav>

<script>

const SUPABASE_URL =
"https://stnhjfodwurnbkzxgnen.supabase.co";

const SUPABASE_KEY =
"sb_publishable_BPytcImkHwDspdh-vNGrtw_LjdFM1RL";

fetch(
`${SUPABASE_URL}/rest/v1/stocks?select=*`,
{
headers:{
"apikey":SUPABASE_KEY,
"Authorization":"Bearer " + SUPABASE_KEY
}
}
)
.then(response=>response.json())
.then(data=>{

console.log(data);

const stock=data[0];

document.getElementById("symbol").innerText =
stock.Symbol;

document.getElementById("scoreText").innerText =
"امتیاز " + stock.Score + " از 100";

document.getElementById("technical").innerText =
stock.Technical;

document.getElementById("smartMoney").innerText =
stock.Smart_money;

document.getElementById("trend").innerText =
stock.Trend;

document.getElementById("fundamental").innerText =
stock.Fundamental;

document.getElementById("industry").innerText =
stock.Industry;

})
.catch(error=>{

console.log(error);

document.getElementById("symbol").innerText =
"خطا در اتصال";

});

</script>

</body>
</html>
