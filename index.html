<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>رادار</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<h1>📈 رادار</h1>
<p>هوشمندتر بازار را رصد کنید</p>
</header>

<div class="market-box">
<div class="market-item">
<h3>شاخص کل</h3>
<span class="green">+1.8%</span>
</div>

<div class="market-item">
<h3>ورود پول</h3>
<span class="green">420B</span>
</div>

<div class="market-item">
<h3>مثبت</h3>
<span>312</span>
</div>
</div>

<div class="card stock-card">
<div class="stock-head">
<div>
<h2>فملی</h2>
<p>امتیاز رادار</p>
</div>
<div class="score">87</div>
</div>

<div class="progress">
<div class="bar" style="width:87%"></div>
</div>

<div class="metrics">
<div>تکنیکال <b>26/30</b></div>
<div>پول هوشمند <b>18/20</b></div>
<div>روند <b>14/15</b></div>
<div>بنیادی <b>12/15</b></div>
<div>صنعت <b>9/10</b></div>
</div>
</div>

<div class="card">
<h2>🎯 فرصت‌های امروز</h2>

<div class="row">
<span>فملی</span>
<b>87</b>
</div>

<div class="row">
<span>فولاد</span>
<b>84</b>
</div>

<div class="row">
<span>شپنا</span>
<b>82</b>
</div>

<div class="row">
<span>کگل</span>
<b>80</b>
</div>
</div>

<div class="card">
<h2>🔥 صنایع داغ</h2>

<div class="row">
<span>فلزات</span>
<b>92</b>
</div>

<div class="row">
<span>پالایشی</span>
<b>88</b>
</div>

<div class="row">
<span>بانکی</span>
<b>81</b>
</div>
</div>

<nav>
<a href="#">خانه</a>
<a href="#">رادار</a>
<a href="#">واچ‌لیست</a>
<a href="#">پروفایل</a>
</nav>

</body>
</html>
